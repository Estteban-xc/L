<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fffdf5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(transparent, transparent 39px, #e2d5b8 39px, #e2d5b8 40px);
    opacity: 0.3;
    pointer-events: none;
  }
  svg {
    animation: mecer 5s ease-in-out infinite;
    transform-origin: 170px 440px;
    filter: drop-shadow(2px 8px 14px rgba(0,0,0,0.09));
  }
  @keyframes mecer {
    0%,100%{transform:rotate(-2deg);}
    50%{transform:rotate(2deg);}
  }
  .msg {
    font-family: 'Caveat', cursive;
    font-size: 2.1rem;
    color: #c0392b;
    margin-top: 14px;
    text-align: center;
    opacity: 0;
    animation: show 1s ease 0.5s forwards;
  }
  @keyframes show { to { opacity:1; } }
</style>
</head>
